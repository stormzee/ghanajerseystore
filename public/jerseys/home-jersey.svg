<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <rect width="400" height="480" fill="#1a1a1a"/>
  <!-- Jersey shape -->
  <path d="M100 80 L60 140 L100 160 L100 400 L300 400 L300 160 L340 140 L300 80 L260 100 Q200 120 140 100 Z" fill="#006B3F" stroke="#FFC107" stroke-width="3"/>
  <!-- Collar -->
  <path d="M155 80 Q200 110 245 80" fill="none" stroke="#FFC107" stroke-width="4"/>
  <!-- Sleeves detail -->
  <path d="M60 140 L100 160" fill="none" stroke="#FFC107" stroke-width="2"/>
  <path d="M300 160 L340 140" fill="none" stroke="#FFC107" stroke-width="2"/>
  <!-- Black Star -->
  <polygon points="200,180 212,215 250,215 220,237 231,272 200,250 169,272 180,237 150,215 188,215" fill="#FFC107"/>
  <!-- GFA Badge area -->
  <rect x="155" y="290" width="90" height="60" rx="8" fill="rgba(255,193,7,0.2)" stroke="#FFC107" stroke-width="1"/>
  <text x="200" y="315" text-anchor="middle" fill="#FFC107" font-family="Arial" font-size="10" font-weight="bold">GHANA</text>
  <text x="200" y="330" text-anchor="middle" fill="#FFC107" font-family="Arial" font-size="9">HOME 2025</text>
  <!-- Stripes -->
  <line x1="100" y1="340" x2="300" y2="340" stroke="#FFC107" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Text label -->
  <text x="200" y="450" text-anchor="middle" fill="#FFC107" font-family="Arial" font-size="14" font-weight="bold">Ghana Home Jersey</text>
  <text x="200" y="468" text-anchor="middle" fill="#888" font-family="Arial" font-size="11">Official 2025</text>
</svg>
