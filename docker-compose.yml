services:
  db:
    image: postgres:16-alpine
    hostname: db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ghanajerseystore
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD", "pg_isready", "-U", "postgres", "-d", "ghanajerseystore"]
      interval: 5s
      timeout:  5s
      retries:  10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL:         postgresql://postgres:postgres@db:5432/ghanajerseystore
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      AUTH_SECRET:          ${AUTH_SECRET}
      ADMIN_EMAIL:          ${ADMIN_EMAIL}
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    links:
      - db

volumes:
  postgres_data:
  uploads_data:
