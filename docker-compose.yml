services:
  db:
    image: postgres:16-alpine
    hostname: db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ghanajerseystore
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD", "pg_isready", "-U", "postgres", "-d", "ghanajerseystore"]
      interval: 5s
      timeout:  5s
      retries:  10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL:    postgresql://postgres:postgres@db:5432/ghanajerseystore
      AUTH_SECRET:     ${AUTH_SECRET}
      NEXTAUTH_URL:    ${NEXTAUTH_URL:-http://localhost:3000}
      # Built-in admin account (role: admin) – full access to all features
      ADMIN_EMAIL:     ${ADMIN_EMAIL}
      ADMIN_PASSWORD:  ${ADMIN_PASSWORD}
      # Roles: admin (env-based) | manager (DB-based, promote via Admin → Users tab) | user (default)
      # Optional: SMTP settings for password-reset emails (leave unset to display the reset link instead)
      EMAIL_SERVER:    ${EMAIL_SERVER:-}
      EMAIL_FROM:      ${EMAIL_FROM:-}
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
