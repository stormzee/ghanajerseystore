# Task Similarity Search Platform – Docker Compose
#
# This compose file adds the Task Platform services alongside the existing
# Ghana Jersey Store. Both share the same PostgreSQL host but use separate
# databases (ghanajerseystore vs taskplatform).
#
# Usage:
#   docker compose -f docker-compose.platform.yml up --build

version: "3.9"

services:
  platform-db:
    image: pgvector/pgvector:pg16
    hostname: platform-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskplatform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - platform_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "taskplatform"]
      interval: 5s
      timeout: 5s
      retries: 10

  platform-api:
    build:
      context: ./platform/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@platform-db:5432/taskplatform
      SECRET_KEY: ${PLATFORM_SECRET_KEY:-change-me-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      MEDIA_UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: 20
      MESSAGE_TTL_HOURS: 8
    volumes:
      - platform_uploads:/app/uploads
    depends_on:
      platform-db:
        condition: service_healthy

  platform-web:
    build:
      context: ./platform/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - platform-api

volumes:
  platform_postgres_data:
  platform_uploads:
